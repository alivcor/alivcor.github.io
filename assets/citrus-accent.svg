    <path d="M112 114 C106 120, 98 126, 90 130" stroke="#1e3a16" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.2"/>
    <path d="M80 106 C76 112, 68 118, 60 122" stroke="#1e3a16" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- === LEAF from front orange — going up-right, different shape, narrower === -->
  <g filter="url(#leafGrain)">
    <path d="M172 140 C184 128, 204 110, 228 96 C244 86, 260 82, 268 88 C276 96, 268 108, 252 114 C236 120, 212 118, 194 122 L204 128 C220 132, 240 138, 254 142 C264 146, 268 140, 266 132" fill="#2e5422"/>
    <path d="M174 140 C186 128, 206 112, 226 100 C242 90, 256 86, 264 92 C270 100, 264 108, 250 112 C234 118, 214 118, 196 122" fill="#3d6b32" opacity="0.75"/>
