    <path d="M280 260 C296 248, 322 236, 348 234 C364 232, 374 240, 370 252 C366 264, 348 268, 332 264 C316 260, 300 254, 290 258 C302 264, 318 276, 330 286 C340 294, 344 290, 342 280" fill="#2e5422"/>
