<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 380" fill="none">
  <defs>
    <!-- Grain texture filter -->
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainBlend"/>
      <feComponentTransfer in="grainBlend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Rougher grain for leaves -->
    <filter id="leafGrain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainBlend"/>
      <feComponentTransfer in="grainBlend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Soft shadow for depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="3" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#5a3a10" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === MAIN BRANCH — bark texture === -->
  <path d="M170 8 C168 28, 160 60, 148 100 C136 140, 128 180, 132 210" stroke="#6b5a38" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M170 8 C168 28, 160 60, 148 100 C136 140, 128 180, 132 210" stroke="#4a3e22" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4" stroke-dasharray="2 5"/>
  <path d="M171 10 C169 30, 161 62, 149 102 C137 142, 129 182, 133 212" stroke="#8a7a52" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Sub-branches -->
  <path d="M158 72 C172 78, 188 90, 198 108" stroke="#6b5a38" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M159 74 C173 80, 189 92, 199 110" stroke="#8a7a52" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M152 90 C138 98, 118 108, 105 125" stroke="#6b5a38" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M140 155 C154 162, 172 175, 182 192" stroke="#6b5a38" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- === TOP-RIGHT LEAF — layered shading === -->
  <g filter="url(#leafGrain)">
    <!-- Shadow layer -->
    <path d="M170 12 C186 -2, 214 -8, 232 2 C246 10, 242 30, 224 34 C206 38, 182 26, 170 12Z" fill="#2e5422"/>
    <!-- Mid tone -->
    <path d="M172 12 C188 0, 212 -6, 228 4 C240 12, 238 28, 222 32 C206 36, 184 26, 172 12Z" fill="#3d6b32"/>
    <!-- Lighter face catching light -->
    <path d="M184 6 C198 -2, 218 -2, 226 6 C232 12, 228 22, 218 26 C208 28, 192 20, 184 6Z" fill="#5c8f48" opacity="0.65"/>
    <!-- Highlight streak -->
    <path d="M196 4 C206 0, 218 2, 222 8" stroke="#7ab868" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
    <!-- Dark vein -->
    <path d="M172 12 C194 4, 216 2, 228 8" stroke="#2a4a1e" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M200 6 C202 14, 208 22, 216 26" stroke="#2a4a1e" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- Edge wear -->
    <path d="M226 6 C234 12, 236 24, 224 32" stroke="#4d7a3e" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.3" stroke-dasharray="1 3"/>
  </g>

  <!-- === TOP-LEFT LEAF === -->
  <g filter="url(#leafGrain)">
    <path d="M166 18 C148 4, 120 -4, 102 6 C88 14, 92 34, 110 38 C128 42, 154 30, 166 18Z" fill="#2e5422"/>
    <path d="M164 18 C148 6, 122 -2, 106 8 C94 16, 96 32, 112 36 C128 40, 152 30, 164 18Z" fill="#3d6b32"/>
    <path d="M148 8 C136 4, 118 4, 110 10 C104 16, 106 26, 116 30 C126 34, 142 26, 148 8Z" fill="#5c8f48" opacity="0.5"/>
    <path d="M130 6 C120 8, 112 14, 110 22" stroke="#7ab868" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M164 18 C144 8, 122 4, 106 10" stroke="#2a4a1e" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M140 10 C134 18, 124 26, 116 30" stroke="#2a4a1e" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- === ORANGE 2 — behind left (painted first so it's behind) === -->
  <g filter="url(#softShadow)">
    <g filter="url(#grain)">
      <!-- Deep shadow base -->
      <path d="M82 118 C100 108, 124 110, 136 128 C148 146, 148 172, 138 188 C128 204, 108 210, 90 206 C72 202, 58 186, 54 166 C50 146, 62 126, 82 118Z" fill="#9a6a14"/>
      <!-- Main body -->
      <path d="M84 120 C102 110, 122 114, 134 130 C144 148, 144 170, 136 186 C126 200, 108 206, 92 202 C76 198, 62 184, 58 166 C54 148, 66 128, 84 120Z" fill="#c88520"/>
      <!-- Warm mid-tone -->
      <path d="M88 126 C104 118, 120 122, 130 136 C138 150, 138 168, 130 180 C122 192, 108 196, 96 192 C84 188, 72 176, 68 162 C64 148, 74 132, 88 126Z" fill="#d4922a" opacity="0.7"/>
      <!-- Light catching top-left -->
      <path d="M92 132 C104 124, 118 128, 124 140 C130 152, 126 166, 116 172 C106 178, 94 172, 90 160 C86 148, 86 138, 92 132Z" fill="#e8a832" opacity="0.6"/>
      <!-- Hot highlight -->
      <path d="M98 138 C106 132, 116 136, 118 144 C120 152, 114 158, 106 158 C98 158, 94 150, 96 144Z" fill="#f0c848" opacity="0.4"/>
      <!-- Shadow on bottom-right -->
      <path d="M110 180 C118 174, 128 178, 132 186 C134 192, 126 198, 118 196 C110 194, 106 186, 110 180Z" fill="#8a5a0e" opacity="0.35"/>
      <!-- Speckle texture -->
      <circle cx="100" cy="135" r="1.8" fill="#a06810" opacity="0.4"/>
      <circle cx="120" cy="152" r="1.4" fill="#8a5a0e" opacity="0.3"/>
      <circle cx="88" cy="168" r="2" fill="#a06810" opacity="0.25"/>
      <circle cx="112" cy="142" r="1" fill="#f0c848" opacity="0.2"/>
      <circle cx="78" cy="155" r="1.5" fill="#8a5a0e" opacity="0.3"/>
      <circle cx="128" cy="165" r="1.2" fill="#a06810" opacity="0.25"/>
      <!-- Rough skin texture strokes -->
      <path d="M96 145 C98 142, 102 143, 101 146" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.3"/>
      <path d="M114 158 C116 155, 120 156, 119 159" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
      <path d="M82 162 C84 159, 88 160, 87 163" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.3"/>
    </g>
  </g>

  <!-- === ORANGE 3 — behind right === -->
  <g filter="url(#softShadow)">
    <g filter="url(#grain)">
      <path d="M202 108 C222 100, 248 106, 260 126 C272 146, 270 174, 258 190 C246 206, 224 212, 206 206 C188 200, 174 182, 172 160 C170 138, 184 116, 202 108Z" fill="#9a6a14"/>
      <path d="M204 110 C224 102, 246 110, 256 128 C266 146, 264 172, 254 186 C242 200, 224 206, 210 200 C196 194, 184 178, 182 160 C180 140, 190 118, 204 110Z" fill="#c88520"/>
      <path d="M210 118 C226 112, 244 118, 252 134 C260 150, 258 170, 248 182 C238 194, 222 198, 212 194 C202 190, 192 176, 190 160 C188 144, 198 126, 210 118Z" fill="#d4922a" opacity="0.7"/>
      <path d="M216 128 C228 122, 242 128, 248 140 C254 152, 250 166, 240 174 C230 180, 218 176, 214 164 C210 152, 210 136, 216 128Z" fill="#e8a832" opacity="0.55"/>
      <path d="M222 136 C230 130, 240 134, 242 142 C244 150, 238 156, 230 156 C222 156, 218 148, 220 142Z" fill="#f0c848" opacity="0.35"/>
      <path d="M232 178 C240 172, 250 176, 252 184 C254 190, 246 196, 238 194 C230 192, 228 184, 232 178Z" fill="#8a5a0e" opacity="0.3"/>
      <circle cx="228" cy="128" r="1.6" fill="#a06810" opacity="0.35"/>
      <circle cx="246" cy="148" r="1.8" fill="#8a5a0e" opacity="0.25"/>
      <circle cx="214" cy="166" r="1.4" fill="#a06810" opacity="0.3"/>
      <circle cx="240" cy="170" r="1.2" fill="#8a5a0e" opacity="0.25"/>
      <path d="M226 150 C228 147, 232 148, 231 151" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.3"/>
      <path d="M210 142 C212 139, 216 140, 215 143" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
    </g>
  </g>

  <!-- === ORANGE 1 — front center, biggest === -->
  <g filter="url(#softShadow)">
    <g filter="url(#grain)">
      <!-- Deep base -->
      <path d="M148 68 C172 60, 200 66, 214 88 C228 110, 226 140, 212 158 C198 176, 170 182, 146 176 C122 170, 104 148, 102 124 C100 100, 120 76, 148 68Z" fill="#9a6a14"/>
      <!-- Main warm body -->
      <path d="M150 70 C174 62, 198 70, 212 90 C224 110, 222 138, 210 154 C196 170, 170 176, 150 170 C130 164, 112 146, 110 124 C108 102, 126 78, 150 70Z" fill="#c88520"/>
      <!-- Warmer mid -->
      <path d="M154 76 C176 68, 196 76, 208 94 C218 112, 216 136, 206 150 C194 164, 172 170, 154 164 C136 158, 120 142, 118 124 C116 106, 134 84, 154 76Z" fill="#d4922a" opacity="0.75"/>
      <!-- Lighter face — light from upper-left -->
      <path d="M148 84 C164 76, 184 80, 194 96 C202 110, 198 130, 186 140 C174 150, 156 148, 148 136 C140 124, 138 100, 148 84Z" fill="#e8a832" opacity="0.7"/>
      <!-- Bright highlight -->
      <path d="M154 92 C164 84, 180 88, 186 100 C192 112, 186 126, 176 130 C166 134, 154 126, 152 114 C150 106, 150 98, 154 92Z" fill="#f0be48" opacity="0.55"/>
      <!-- Hot spot -->
      <path d="M160 98 C168 92, 178 96, 180 104 C182 112, 176 118, 168 118 C160 118, 156 110, 158 104Z" fill="#f5d060" opacity="0.4"/>
      <!-- Tiny specular -->
      <ellipse cx="166" cy="100" rx="4" ry="3" fill="#fae080" opacity="0.25" transform="rotate(-15 166 100)"/>
      <!-- Shadow crescent bottom-right -->
      <path d="M188 142 C198 134, 210 138, 214 150 C218 160, 208 170, 196 168 C184 166, 182 152, 188 142Z" fill="#7a4e08" opacity="0.35"/>
      <!-- Deep shadow bottom -->
      <path d="M152 162 C164 158, 180 162, 186 170 C190 176, 180 180, 168 178 C156 176, 148 170, 152 162Z" fill="#6a4206" opacity="0.25"/>
      <!-- Rich speckle texture -->
      <circle cx="168" cy="88" r="2.2" fill="#a06810" opacity="0.4"/>
      <circle cx="188" cy="106" r="1.8" fill="#8a5a0e" opacity="0.35"/>
      <circle cx="140" cy="110" r="2.4" fill="#a06810" opacity="0.25"/>
      <circle cx="202" cy="126" r="1.5" fill="#7a4e08" opacity="0.35"/>
      <circle cx="160" cy="152" r="2" fill="#a06810" opacity="0.3"/>
      <circle cx="130" cy="98" r="1.6" fill="#8a5a0e" opacity="0.3"/>
      <circle cx="206" cy="110" r="1.8" fill="#a06810" opacity="0.2"/>
      <circle cx="176" cy="72" r="1.3" fill="#c4820a" opacity="0.3"/>
      <circle cx="144" cy="140" r="1.4" fill="#7a4e08" opacity="0.3"/>
      <!-- Skin texture — tiny irregular marks -->
      <path d="M162 108 C164 105, 168 106, 167 109" stroke="#a06810" stroke-width="0.7" fill="none" opacity="0.35"/>
      <path d="M178 120 C180 117, 184 118, 183 121" stroke="#a06810" stroke-width="0.7" fill="none" opacity="0.3"/>
      <path d="M142 122 C144 119, 148 120, 147 123" stroke="#a06810" stroke-width="0.7" fill="none" opacity="0.3"/>
      <path d="M192 98 C194 95, 198 96, 197 99" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
      <path d="M134 132 C136 129, 140 130, 139 133" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
      <!-- Navel dimple at bottom -->
      <ellipse cx="162" cy="172" rx="4" ry="2.5" fill="#8a5a0e" opacity="0.3"/>
      <ellipse cx="162" cy="172" rx="2.5" ry="1.5" fill="#6a4206" opacity="0.2"/>
      <!-- Rough outline — uneven pressure -->
      <path d="M148 68 C172 60, 200 66, 214 88 C228 110, 226 140, 212 158 C198 176, 170 182, 146 176 C122 170, 104 148, 102 124 C100 100, 120 76, 148 68Z" fill="none" stroke="#7a4e08" stroke-width="1.4" opacity="0.2"/>
    </g>
  </g>

  <!-- === SMALL ORANGE 4 — peeking bottom === -->
  <g filter="url(#softShadow)">
    <g filter="url(#grain)">
      <path d="M148 195 C164 188, 184 192, 194 208 C204 224, 202 246, 192 258 C182 270, 164 274, 150 268 C136 262, 126 248, 124 232 C122 216, 134 200, 148 195Z" fill="#9a6a14"/>
      <path d="M150 198 C166 190, 182 196, 192 210 C200 226, 198 244, 190 256 C180 266, 164 270, 154 264 C144 258, 134 246, 132 232 C130 218, 140 204, 150 198Z" fill="#c88520"/>
      <path d="M154 204 C168 196, 180 202, 188 214 C196 228, 194 244, 186 252 C176 260, 164 262, 156 258 C148 254, 140 242, 138 230 C136 218, 144 208, 154 204Z" fill="#d4922a" opacity="0.7"/>
      <path d="M158 212 C168 206, 178 210, 184 220 C190 230, 186 244, 178 248 C170 252, 160 246, 158 236 C156 228, 156 218, 158 212Z" fill="#e8a832" opacity="0.55"/>
      <path d="M162 218 C170 212, 178 216, 180 224 C182 232, 176 238, 168 238 C160 238, 158 230, 160 224Z" fill="#f0be48" opacity="0.35"/>
      <path d="M172 248 C178 244, 186 248, 186 254 C186 260, 178 262, 172 258Z" fill="#7a4e08" opacity="0.3"/>
      <circle cx="168" cy="210" r="1.4" fill="#a06810" opacity="0.35"/>
      <circle cx="180" cy="228" r="1.2" fill="#8a5a0e" opacity="0.25"/>
      <circle cx="148" cy="238" r="1.6" fill="#a06810" opacity="0.3"/>
      <circle cx="174" cy="244" r="1" fill="#7a4e08" opacity="0.25"/>
      <path d="M148 195 C164 188, 184 192, 194 208 C204 224, 202 246, 192 258 C182 270, 164 274, 150 268 C136 262, 126 248, 124 232 C122 216, 134 200, 148 195Z" fill="none" stroke="#7a4e08" stroke-width="1" opacity="0.18"/>
    </g>
  </g>

  <!-- === LEFT LEAF from branch === -->
  <g filter="url(#leafGrain)">
    <path d="M108 108 C92 92, 66 82, 50 92 C38 100, 42 118, 58 124 C74 130, 98 120, 108 108Z" fill="#2e5422"/>
    <path d="M106 108 C92 94, 68 86, 54 94 C44 102, 46 116, 60 122 C74 128, 96 118, 106 108Z" fill="#3d6b32"/>
    <path d="M96 100 C86 94, 72 92, 62 98 C54 104, 58 114, 68 118 C78 122, 90 114, 96 100Z" fill="#5c8f48" opacity="0.55"/>
    <path d="M82 96 C74 98, 66 104, 64 112" stroke="#7ab868" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M106 108 C90 96, 72 90, 54 96" stroke="#2a4a1e" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M86 96 C80 104, 72 112, 64 116" stroke="#2a4a1e" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- === RIGHT LEAF from sub-branch === -->
  <g filter="url(#leafGrain)">
    <path d="M198 104 C214 88, 240 80, 258 90 C272 98, 268 118, 250 122 C232 126, 210 116, 198 104Z" fill="#2e5422"/>
    <path d="M200 106 C216 90, 238 84, 254 92 C266 100, 262 116, 246 120 C230 124, 212 114, 200 106Z" fill="#3d6b32"/>
    <path d="M218 92 C230 86, 248 88, 254 96 C260 104, 254 114, 242 116 C230 118, 220 108, 218 92Z" fill="#5c8f48" opacity="0.5"/>
    <path d="M238 88 C246 92, 252 100, 250 110" stroke="#7ab868" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.25"/>
    <path d="M200 104 C218 92, 240 88, 254 94" stroke="#2a4a1e" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M230 90 C234 100, 240 110, 246 116" stroke="#2a4a1e" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- === BOTTOM LEAF === -->
  <g filter="url(#leafGrain)">
    <path d="M136 210 C122 198, 100 194, 88 204 C78 212, 84 228, 100 230 C116 232, 132 220, 136 210Z" fill="#2e5422" opacity="0.9"/>
    <path d="M134 212 C122 200, 104 198, 92 206 C84 214, 88 226, 102 228 C116 230, 130 220, 134 212Z" fill="#3d6b32"/>
    <path d="M120 204 C112 206, 100 210, 96 218 C92 224, 98 228, 108 226 C116 224, 122 214, 120 204Z" fill="#5c8f48" opacity="0.45"/>
    <path d="M134 210 C118 200, 102 198, 92 206" stroke="#2a4a1e" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M112 204 C106 212, 98 220, 96 224" stroke="#2a4a1e" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- === Ink bleed / print artifacts === -->
  <circle cx="58" cy="138" r="2.5" fill="#3d6b32" opacity="0.1"/>
  <circle cx="262" cy="162" r="3" fill="#a06810" opacity="0.08"/>
  <circle cx="168" cy="282" r="2" fill="#3d6b32" opacity="0.06"/>
  <circle cx="42" cy="108" r="1.5" fill="#6b5a38" opacity="0.08"/>
</svg>