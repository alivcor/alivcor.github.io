  <path d="M107 132 C105 126, 107 120, 105 116" stroke="#3d5a28" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Leaf from back-left — long, twisting, curling to the left, pointy tip -->
  <g filter="url(#leafGrain)">
    <!-- This leaf curls and twists — narrow, long, sharp tip, irregular -->
    <path d="M106 120 C94 112, 72 98, 48 88 C32 82, 14 84, 8 94 C2 106, 16 116, 34 118 C52 120, 78 112, 92 108 C86 114, 74 122, 62 128 C50 134, 38 130, 32 122" fill="#3d6b32"/>
