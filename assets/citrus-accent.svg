    <!-- Light catching the fold -->
    <path d="M114 126 C98 122, 76 114, 58 110 C46 106, 42 112, 44 120 C46 128, 56 132, 66 132" fill="#5c8f48" opacity="0.45"/>
    <!-- Highlight streak -->
    <path d="M130 122 C112 116, 88 108, 66 106 C52 104, 44 110, 46 118" stroke="#7ab868" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.25"/>
    <!-- Dark midrib — wobbly, hand-drawn feel -->
    <path d="M168 140 C150 132, 124 118, 96 108 C74 100, 50 100, 40 110" stroke="#1e3a16" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"/>
    <!-- Side veins -->
