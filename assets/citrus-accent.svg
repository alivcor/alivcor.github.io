  <path d="M169 156 C171 148, 167 142, 171 136" stroke="#3d5a28" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- === LEAF from front orange — long, twisting down-left, sharp tip, curling === -->
  <g filter="url(#leafGrain)">
    <!-- Main shape — long, narrow, pointy, with a twist/fold -->
    <path d="M170 140 C156 132, 130 118, 100 108 C78 100, 54 98, 42 108 C32 118, 40 132, 56 136 C72 140, 96 132, 116 126 L108 134 C92 142, 72 148, 56 150 C44 152, 36 146, 34 136" fill="#2e5422"/>
