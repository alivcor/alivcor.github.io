  <circle cx="300" cy="275" r="4.5" fill="#f5e0a0" stroke="#d4a030" stroke-width="0.7"/>
  <!-- Stem nub -->
  <path d="M298 233 C298 230, 300 228, 302 233" stroke="#5a7a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

