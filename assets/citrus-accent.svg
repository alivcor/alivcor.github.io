    <path d="M100 162 C108 154, 120 156, 124 164 C128 172, 122 182, 114 184 C106 186, 98 178, 98 170Z" fill="#f0c040" opacity="0.35"/>
    <circle cx="108" cy="155" r="1.6" fill="#a06810" opacity="0.35"/>
    <circle cx="130" cy="170" r="1.3" fill="#8a5a0e" opacity="0.3"/>
    <circle cx="90" cy="182" r="1.8" fill="#a06810" opacity="0.25"/>
    <circle cx="118" cy="195" r="1.2" fill="#8a5a0e" opacity="0.3"/>
    <path d="M104 170 C106 167, 110 168, 109 171" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.3"/>
  </g>
  </g>

  <!-- Stubby stem on back-left orange -->
