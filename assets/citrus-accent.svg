    <ellipse cx="172" cy="268" rx="3" ry="1.8" fill="#6a4206" opacity="0.15"/>
    <!-- Speckles -->
    <circle cx="178" cy="176" r="2.2" fill="#a06810" opacity="0.4"/>
    <circle cx="200" cy="198" r="1.6" fill="#8a5a0e" opacity="0.3"/>
    <circle cx="148" cy="206" r="2.4" fill="#a06810" opacity="0.2"/>
