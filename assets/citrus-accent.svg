    <circle cx="136" cy="192" r="1.4" fill="#8a5a0e" opacity="0.3"/>
    <circle cx="220" cy="200" r="1.6" fill="#a06810" opacity="0.2"/>
    <circle cx="186" cy="166" r="1.2" fill="#c4820a" opacity="0.3"/>
    <circle cx="152" cy="240" r="1.5" fill="#7a4e08" opacity="0.25"/>
    <!-- Skin texture marks -->
    <path d="M174 208 C176 205, 180 206, 179 209" stroke="#a06810" stroke-width="0.7" fill="none" opacity="0.3"/>
    <path d="M192 220 C194 217, 198 218, 197 221" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
    <path d="M154 222 C156 219, 160 220, 159 223" stroke="#a06810" stroke-width="0.6" fill="none" opacity="0.25"/>
