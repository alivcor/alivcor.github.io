    <path d="M248 152 C262 142, 280 144, 290 156 C298 168, 294 186, 282 194 C270 200, 254 196, 248 184 C242 172, 244 158, 248 152Z" fill="#e8a832" opacity="0.5"/>
    <path d="M256 160 C266 152, 278 156, 282 166 C286 176, 278 184, 268 184 C258 184, 252 174, 254 166Z" fill="#f0c040" opacity="0.3"/>
    <circle cx="264" cy="148" r="1.8" fill="#a06810" opacity="0.35"/>
    <circle cx="286" cy="168" r="1.4" fill="#8a5a0e" opacity="0.3"/>
    <circle cx="244" cy="180" r="2" fill="#a06810" opacity="0.25"/>
