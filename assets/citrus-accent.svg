<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 340" fill="none">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <filter id="leafGrain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="3" result="off"/>
      <feFlood flood-color="#4a3a18" flood-opacity="0.1" result="c"/>
      <feComposite in="c" in2="off" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Oranges sitting on a surface, clustered together -->
  <!-- No branch from above — just short stubby stems with leaves attached -->

  <!-- === BACK-LEFT ORANGE (partially hidden) === -->
  <g filter="url(#shadow)">
  <g filter="url(#grain)">
    <path d="M72 142 C88 126, 118 120, 140 132 C158 142, 164 168, 156 190 C148 210, 124 222, 100 218 C76 214, 58 196, 56 174 C54 156, 60 148, 72 142Z" fill="#9a6a14"/>
