    <path d="M330 242 C332 250, 336 258, 338 264" stroke="#1e3a16" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- === LOOSE LEAF — bottom left, small, curled tight === -->
